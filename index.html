<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI五子棋</title>

<style>
body {
    margin: 0;
    background: #f2f2f2;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    text-align: center;
}

h1 {
    margin-bottom: 10px;
}

#status {
    font-size: 20px;
    margin-bottom: 15px;
    font-weight: bold;
}

canvas {
    background: #d8a45d;
    border: 3px solid #8b5a2b;
    box-shadow: 0 0 15px rgba(0,0,0,0.3);
    cursor: pointer;
}

button {
    margin-top: 20px;
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: black;
    color: white;
    cursor: pointer;
}

button:hover {
    opacity: 0.8;
}
</style>
</head>
<body>

<div class="container">
    <h1>🤖 AI人机五子棋</h1>

    <div id="status">你是 ⚫ 黑棋</div>

    <canvas id="board" width="600" height="600"></canvas>

    <br>

    <button onclick="resetGame()">重新开始</button>
</div>

<script>
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');

const size = 15;
const cellSize = 40;
const offset = 20;

let board = [];
let gameOver = false;

const HUMAN = 1;
const AI = 2;

function initBoard() {
    board = [];

    for (let i = 0; i < size; i++) {
        board[i] = [];

        for (let j = 0; j < size; j++) {
            board[i][j] = 0;
        }
    }
}

function drawBoard() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let i = 0; i < size; i++) {

        ctx.beginPath();
        ctx.moveTo(offset, offset + i * cellSize);
        ctx.lineTo(offset + (size - 1) * cellSize, offset + i * cellSize);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(offset + i * cellSize, offset);
        ctx.lineTo(offset + i * cellSize, offset + (size - 1) * cellSize);
        ctx.stroke();
    }
}

function drawPiece(x, y, player) {
    ctx.beginPath();

    ctx.arc(
        offset + x * cellSize,
        offset + y * cellSize,
        15,
        0,
        Math.PI * 2
    );

    ctx.fillStyle = player === HUMAN ? 'black' : 'white';

    ctx.fill();
    ctx.stroke();
}

function checkWin(x, y, player) {

    const directions = [
        [1, 0],
        [0, 1],
        [1, 1],
        [1, -1]
    ];

    for (let [dx, dy] of directions) {

        let count = 1;

        for (let dir of [-1, 1]) {

            let nx = x + dx * dir;
            let ny = y + dy * dir;

            while (
                nx >= 0 &&
                nx < size &&
                ny >= 0 &&
                ny < size &&
                board[nx][ny] === player
            ) {
                count++;
                nx += dx * dir;
                ny += dy * dir;
            }
        }

        if (count >= 5) {
            return true;
        }
    }

    return false;
}

function evaluatePosition(x, y, player) {

    const directions = [
        [1, 0],
        [0, 1],
        [1, 1],
        [1, -1]
    ];

    let score = 0;

    for (let [dx, dy] of directions) {

        let count = 1;

        for (let dir of [-1, 1]) {

            let nx = x + dx * dir;
            let ny = y + dy * dir;

            while (
                nx >= 0 &&
                nx < size &&
                ny >= 0 &&
                ny < size &&
                board[nx][ny] === player
            ) {
                count++;
                nx += dx * dir;
                ny += dy * dir;
            }
        }

        score += Math.pow(count, 3);
    }

    return score;
}

function aiMove() {

    let bestScore = -1;
    let bestMove = null;

    for (let x = 0; x < size; x++) {

        for (let y = 0; y < size; y++) {

            if (board[x][y] === 0) {

                let attackScore = evaluatePosition(x, y, AI);
                let defenseScore = evaluatePosition(x, y, HUMAN);

                let totalScore = attackScore + defenseScore * 1.2;

                if (totalScore > bestScore) {
                    bestScore = totalScore;
                    bestMove = { x, y };
                }
            }
        }
    }

    if (bestMove) {

        board[bestMove.x][bestMove.y] = AI;

        drawPiece(bestMove.x, bestMove.y, AI);

        if (checkWin(bestMove.x, bestMove.y, AI)) {

            gameOver = true;

            document.getElementById('status').innerHTML = '🤖 AI获胜！';

            return;
        }

        document.getElementById('status').innerHTML = '你的回合 ⚫';
    }
}

canvas.addEventListener('click', function (e) {

    if (gameOver) return;

    const rect = canvas.getBoundingClientRect();

    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;

    const x = Math.round((mouseX - offset) / cellSize);
    const y = Math.round((mouseY - offset) / cellSize);

    if (
        x < 0 ||
        x >= size ||
        y < 0 ||
        y >= size
    ) {
        return;
    }

    if (board[x][y] !== 0) {
        return;
    }

    board[x][y] = HUMAN;

    drawPiece(x, y, HUMAN);

    if (checkWin(x, y, HUMAN)) {

        gameOver = true;

        document.getElementById('status').innerHTML = '🎉 你赢了！';

        return;
    }

    document.getElementById('status').innerHTML = '🤖 AI思考中...';

    setTimeout(aiMove, 300);
});

function resetGame() {

    gameOver = false;

    initBoard();

    drawBoard();

    document.getElementById('status').innerHTML = '你是 ⚫ 黑棋';
}

initBoard();
drawBoard();
</script>

</body>
</html>
