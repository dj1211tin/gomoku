<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI五子棋（升级版）</title>

<style>
body {
    margin: 0;
    background: #f2f2f2;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial;
}

.container {
    text-align: center;
    position: relative;
}

#status {
    font-size: 20px;
    margin-bottom: 10px;
    font-weight: bold;
}

canvas {
    background: #d8a45d;
    border: 3px solid #8b5a2b;
    box-shadow: 0 0 15px rgba(0,0,0,0.3);
    cursor: pointer;
}

button {
    margin-top: 15px;
    padding: 10px 20px;
    font-size: 16px;
    border: none;
    background: black;
    color: white;
    border-radius: 10px;
    cursor: pointer;
}

/* 🎯 胜利居中提示 */
#winOverlay{
    position:absolute;
    width:600px;
    height:600px;
    display:none;
    justify-content:center;
    align-items:center;
    font-size:70px;
    font-weight:bold;
    color:red;
    background:rgba(255,255,255,0.35);
    top:80px;
    left:50%;
    transform:translateX(-50%);
    pointer-events:none;
}
</style>
</head>

<body>

<div class="container">
    <h1>🤖 AI五子棋（交叉点版）</h1>

    <div id="status">你先手 ⚫</div>

    <div id="winOverlay"></div>

    <canvas id="board" width="600" height="600"></canvas>

    <br>

    <button onclick="resetGame()">重新开始</button>
</div>

<script>
const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");

const winEl = document.getElementById("winOverlay");

const size = 15;
const grid = 40;
const offset = 20;

let board = [];
let gameOver = false;

const HUMAN = 1;
const AI = 2;

function initBoard() {
    board = Array(size).fill(null).map(() => Array(size).fill(0));
}

function drawBoard() {
    ctx.clearRect(0, 0, 600, 600);

    for (let i = 0; i < size; i++) {

        ctx.beginPath();
        ctx.moveTo(offset, offset + i * grid);
        ctx.lineTo(offset + (size - 1) * grid, offset + i * grid);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(offset + i * grid, offset);
        ctx.lineTo(offset + i * grid, offset + (size - 1) * grid);
        ctx.stroke();
    }
}

// 🎯 交叉点落子
function drawPiece(x, y, player) {
    ctx.beginPath();
    ctx.arc(
        offset + x * grid,
        offset + y * grid,
        14,
        0,
        Math.PI * 2
    );

    ctx.fillStyle = player === HUMAN ? "black" : "white";
    ctx.fill();
    ctx.stroke();
}

// 胜利检测
function checkWin(x, y, p) {
    const dirs = [
        [1,0],[0,1],[1,1],[1,-1]
    ];

    for (let [dx,dy] of dirs) {
        let count = 1;

        for (let d of [1,-1]) {
            let nx = x + dx*d;
            let ny = y + dy*d;

            while (
                nx>=0 && nx<size &&
                ny>=0 && ny<size &&
                board[nx][ny] === p
            ) {
                count++;
                nx += dx*d;
                ny += dy*d;
            }
        }

        if (count >= 5) return true;
    }

    return false;
}

// AI评分
function score(x, y, p) {
    const dirs = [[1,0],[0,1],[1,1],[1,-1]];
    let s = 0;

    for (let [dx,dy] of dirs) {
        let count = 1;

        for (let d of [1,-1]) {
            let nx = x + dx*d;
            let ny = y + dy*d;

            while (
                nx>=0 && nx<size &&
                ny>=0 && ny<size &&
                board[nx][ny] === p
            ) {
                count++;
                nx += dx*d;
                ny += dy*d;
            }
        }

        s += count * count;
    }

    return s;
}

// 🤖 AI下棋
function aiMove() {

    let best = null;
    let bestScore = -1;

    for (let i = 0; i < size; i++) {
        for (let j = 0; j < size; j++) {

            if (board[i][j] === 0) {

                let attack = score(i,j,AI);
                let defend = score(i,j,HUMAN);

                let total = attack + defend * 1.2;

                if (total > bestScore) {
                    bestScore = total;
                    best = [i,j];
                }
            }
        }
    }

    if (!best) return;

    let [x,y] = best;

    board[x][y] = AI;
    drawPiece(x,y,AI);

    if (checkWin(x,y,AI)) {
        gameOver = true;
        document.getElementById("status").innerText = "";
        winEl.style.display = "flex";
        winEl.innerText = "🤖 AI WIN!";
        return;
    }

    document.getElementById("status").innerText = "你的回合 ⚫";
}

// 点击落子
canvas.addEventListener("click", function(e) {

    if (gameOver) return;

    const rect = canvas.getBoundingClientRect();

    let x = Math.round((e.clientX - rect.left - offset) / grid);
    let y = Math.round((e.clientY - rect.top - offset) / grid);

    if (x<0||x>=size||y<0||y>=size) return;
    if (board[x][y] !== 0) return;

    board[x][y] = HUMAN;
    drawPiece(x,y,HUMAN);

    if (checkWin(x,y,HUMAN)) {
        gameOver = true;
        document.getElementById("status").innerText = "";
        winEl.style.display = "flex";
        winEl.innerText = "🎉 YOU WIN!";
        return;
    }

    document.getElementById("status").innerText = "AI思考中...";
    setTimeout(aiMove, 300);
});

// 重置
function resetGame() {
    initBoard();
    drawBoard();
    gameOver = false;
    winEl.style.display = "none";
    document.getElementById("status").innerText = "你先手 ⚫";
}

initBoard();
drawBoard();
</script>

</body>
</html>
